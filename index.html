<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f4f4f4;
      cursor: pointer;
    }

    tbody tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tbody tr:hover {
      background-color: #dfefff;
    }

    input {
      margin: 5px;
      padding: 5px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Danh sách sản phẩm</h2>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="sort-name">Tên sản phẩm ▲▼</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <h2>Thêm sản phẩm</h2>

  <input id="input-name" placeholder="Tên sản phẩm">
  <input id="input-category" placeholder="Danh mục">
  <input id="input-price" type="number" placeholder="Đơn giá">
  <input id="input-quantity" type="number" placeholder="Số lượng">
  <button id="btn-add">Thêm</button>

  <script>
    let products = [];
    let isAscending = true;

    const tbody = document.querySelector("#product-table tbody");
    const sortHeader = document.getElementById("sort-name");

    function renderTable(data) {
      tbody.innerHTML = "";

      data.forEach((p, index) => {
        const row = `
          <tr>
            <td>${index + 1}</td>
            <td>${p.name}</td>
            <td>${p.category || ""}</td>
            <td>${p.price}</td>
            <td>${p.quantity}</td>
          </tr>
        `;
        tbody.innerHTML += row;
      });
    }

    // AJAX load dữ liệu
    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        renderTable(products);
      }
    };
    xhr.open("GET", "products.json");
    xhr.send();

    // SORT theo tên
    sortHeader.addEventListener("click", () => {
      products.sort((a, b) => {
        if (a.name.toLowerCase() < b.name.toLowerCase()) return isAscending ? -1 : 1;
        if (a.name.toLowerCase() > b.name.toLowerCase()) return isAscending ? 1 : -1;
        return 0;
      });

      isAscending = !isAscending;

      sortHeader.innerHTML = "Tên sản phẩm " + (isAscending ? "▲" : "▼");

      renderTable(products);
    });

    // Thêm sản phẩm
    document.getElementById("btn-add").addEventListener("click", () => {
      const name = document.getElementById("input-name").value.trim();
      const category = document.getElementById("input-category").value.trim();
      const price = parseFloat(document.getElementById("input-price").value);
      const quantity = parseInt(document.getElementById("input-quantity").value);

      // Validation
      if (name.length < 3) {
        alert("Tên sản phẩm phải >= 3 ký tự");
        return;
      }

      if (isNaN(price) || price <= 0) {
        alert("Giá phải là số dương");
        return;
      }

      if (isNaN(quantity) || quantity < 1) {
        alert("Số lượng phải >= 1");
        return;
      }

      const newProduct = {
        id: products.length + 1,
        name,
        category,
        price,
        quantity
      };

      products.push(newProduct);
      renderTable(products);

      // Reset form
      document.getElementById("input-name").value = "";
      document.getElementById("input-category").value = "";
      document.getElementById("input-price").value = "";
      document.getElementById("input-quantity").value = "";
    });

  </script>

</body>
</html>
